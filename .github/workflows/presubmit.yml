name: presubmit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/test_graders.py tests/test_tasks.py tests/test_environment.py -q

      - name: OpenEnv validate
        run: |
          openenv validate

      - name: Docker build
        run: |
          if [ -f Dockerfile ]; then
            docker build . -t mltriage-ci
          elif [ -f server/Dockerfile ]; then
            docker build server -t mltriage-ci
          else
            echo "No Dockerfile found" >&2
            exit 1
          fi

  pre_submit_script:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre_submit.py (Docker enabled)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api-inference.huggingface.co/v1' }}
          MODEL_NAME: ${{ vars.MODEL_NAME || 'meta-llama/Llama-3.1-8B-Instruct' }}
        run: |
          set -euo pipefail

          python -m uvicorn server.app:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if ps -p "$SERVER_PID" > /dev/null 2>&1; then
              kill "$SERVER_PID" || true
            fi
          }
          trap cleanup EXIT

          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Server is ready"
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health >/dev/null

          python scripts/pre_submit.py --env-url http://127.0.0.1:8000

      - name: Dump server log on failure
        if: failure()
        run: |
          if [ -f server.log ]; then
            echo "===== server.log ====="
            cat server.log
          fi
