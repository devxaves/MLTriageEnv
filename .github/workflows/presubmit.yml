name: presubmit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/test_graders.py tests/test_tasks.py tests/test_environment.py -q

      - name: OpenEnv validate
        run: |
          openenv validate

      - name: Docker build
        run: |
          if [ -f Dockerfile ]; then
            docker build . -t mltriage-ci
          elif [ -f server/Dockerfile ]; then
            docker build server -t mltriage-ci
          else
            echo "No Dockerfile found" >&2
            exit 1
          fi
